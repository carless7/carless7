name: Validate carles.sh

on:
  push:
    paths:
      - 'carles-sh/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    paths:
      - 'carles-sh/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: carles-sh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: carles-sh/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate Worker bundle
        run: npm run deploy:dry-run
